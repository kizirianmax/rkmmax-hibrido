</head>
<body>
  <noscript>Você precisa habilitar o JavaScript para rodar esta aplicação.</noscript>
  <div id="root"></div>
  <!-- SW kill-switch: remove legacy SWs/caches before bundle loads (1x per session) -->
  <script>
    (function () {
      try {
        var KEY = "rkmmax_sw_kill_html_v1";
        if (!navigator.serviceWorker || sessionStorage.getItem(KEY) === "1") return;

        var changed = false;
        sessionStorage.setItem(KEY, "1");

        Promise.all([
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            return Promise.all(regs.map(function (r) { return r.unregister(); }));
          }),
          typeof caches !== "undefined"
            ? caches.keys().then(function (keys) {
                return Promise.all(
                  keys
                    .filter(function (k) { return k.indexOf("rkmmax-") === 0; })
                    .map(function (k) { return caches.delete(k); })
                );
              })
            : Promise.resolve([])
        ]).then(function (results) {
          var swResults = results[0] || [];
          var cacheResults = results[1] || [];
          changed = swResults.some(Boolean) || cacheResults.some(Boolean);
          if (changed) window.location.reload();
        });
      } catch (e) { /* silent */ }
    })();
  </script>
  <!-- Service Worker: registro (só roda após kill-switch permitir) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/service-worker.js").catch(function () {});
      });
    }
  </script>
  <!-- Vite entry point -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
